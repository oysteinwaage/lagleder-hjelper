<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8d8ea"/>
    </radialGradient>
    <clipPath id="bc">
      <circle cx="256" cy="256" r="178"/>
    </clipPath>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Emerald accent ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#10b981" stroke-width="8" opacity="0.2"/>

  <!-- Ball shadow -->
  <circle cx="260" cy="268" r="178" fill="#000" opacity="0.2"/>

  <!-- Ball -->
  <circle cx="256" cy="256" r="178" fill="url(#ball)"/>

  <!-- Football patches clipped to ball -->
  <g clip-path="url(#bc)" fill="#1e293b">
    <!-- Center pentagon -->
    <polygon points="256,120 325,165 302,248 210,248 187,165"/>
    <!-- NE hexagon -->
    <polygon points="256,120 325,165 390,180 420,110 370,60 296,66"/>
    <!-- E hexagon -->
    <polygon points="325,165 302,248 350,310 420,290 440,210 390,152"/>
    <!-- S hexagon -->
    <polygon points="302,248 210,248 186,330 220,410 295,420 340,340"/>
    <!-- SW hexagon -->
    <polygon points="210,248 187,165 122,164 88,230 100,316 160,340"/>
    <!-- NW hexagon -->
    <polygon points="187,165 256,120 220,58 146,70 104,152 128,216"/>
  </g>

  <!-- Ball border -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3"/>
</svg>
